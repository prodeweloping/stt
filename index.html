<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speech to Text – Pro Toolss</title>
    <meta name="description" content="Real-time speech recognition with multi-language support, copy, download, and a beautiful glassmorphism interface." />
    <meta name="theme-color" content="#6C63FF" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/FkJPMZ8r/Chat-GPT-Image-Jun-18-2026-07-58-22-AM.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Speech to Text – Pro Toolss" />
    <meta property="og:description" content="Real-time speech recognition with multi-language support, copy, download, and a beautiful glassmorphism interface." />
    <meta property="og:type" content="website" />

    <!-- Font Awesome 6.5.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
                   CSS Variables & Reset – Light Theme Only
                   ============================================================ */
        :root {
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            /* Glassmorphism base – Light theme */
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.60);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --glass-radius: 24px;
            --glass-blur: 24px;

            /* Colors – Light theme */
            --bg-start: #e8e6f5;
            --bg-end: #d5d0f0;
            --bg-accent: #c8c2e8;
            --text-primary: #1a1633;
            --text-secondary: rgba(26, 22, 51, 0.75);
            --text-muted: rgba(26, 22, 51, 0.45);
            --accent: #5a52d9;
            --accent-hover: #4a42c9;
            --accent-glow: rgba(90, 82, 217, 0.20);
            --danger: #e55a6a;
            --success: #3bc96e;
            --warning: #eab308;

            --card-bg: var(--glass-bg);
            --card-border: var(--glass-border);
            --card-shadow: var(--glass-shadow);

            --input-bg: rgba(255, 255, 255, 0.60);
            --input-border: rgba(26, 22, 51, 0.10);

            --transition: 0.30s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================================
                   Reset & Base
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-top: 76px;
            /* space for fixed navbar */
            padding-bottom: 0;
        }

        /* ============================================================
                   NAVBAR – Original Solid White (from snippet)
                   ============================================================ */
        .new-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            /* solid white with slight transparency */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .logo-blue {
            color: #007BFF;
        }

        .logo-orange {
            color: #FF6F00;
        }

        .home-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 0;
        }

        .home-btn .lines {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .home-btn .lines span {
            width: 24px;
            height: 3px;
            background: #1e293b;
            border-radius: 10px;
        }

        .home-btn .label {
            font-size: 10px;
            font-weight: 700;
            color: #1e293b;
            margin-top: 3px;
            text-transform: uppercase;
        }

        /* ============================================================
                   MAIN CONTENT – Centered
                   ============================================================ */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px 30px;
            width: 100%;
        }

        /* ============================================================
                   App Container – Glassmorphism Card
                   ============================================================ */
        .app-container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--card-border);
            border-radius: var(--glass-radius);
            box-shadow: var(--card-shadow);
            padding: 28px 30px 24px;
            transition: background var(--transition), border var(--transition), box-shadow var(--transition);
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            z-index: 0;
        }

        /* ============================================================
                   FOOTER – Original Dark Blue (from snippet)
                   ============================================================ */
        footer {
            background: #0b1426;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            flex-shrink: 0;
            margin-top: auto;
        }

        .design-footer {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .highlight {
            color: #facc15;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .highlight:hover {
            opacity: 0.8;
        }

        /* ============================================================
                   All existing app styles (preserved below)
                   ============================================================ */

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 28px;
            color: var(--accent);
            background: rgba(90, 82, 217, 0.12);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            transition: background var(--transition);
        }

        .brand-text h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .brand-text .subtitle {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
            padding: 12px 16px;
            background: var(--input-bg);
            border-radius: 16px;
            border: 1px solid var(--input-border);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            transition: background var(--transition), border var(--transition);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-item .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .status-item .status-dot.idle {
            background: var(--text-muted);
        }

        .status-item .status-dot.listening {
            background: var(--success);
            animation: pulse-dot 1.2s ease-in-out infinite;
        }

        .status-item .status-dot.error {
            background: var(--danger);
        }

        .status-item .status-label {
            font-weight: 400;
            color: var(--text-muted);
        }

        .status-item .status-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-item .status-value.timer {
            font-variant-numeric: tabular-nums;
            min-width: 48px;
            display: inline-block;
        }

        .status-divider {
            width: 1px;
            height: 24px;
            background: var(--input-border);
            flex-shrink: 0;
        }

        .status-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-stats i {
            font-size: 13px;
            opacity: 0.6;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.85);
            }
        }

        /* Controls */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 4px 8px 4px 16px;
            transition: all var(--transition);
            flex: 0 1 auto;
            min-width: 160px;
        }

        .lang-selector:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .lang-selector i {
            color: var(--text-muted);
            font-size: 14px;
        }

        .lang-selector select {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 4px 8px 0;
            cursor: pointer;
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
        }

        .lang-selector select option {
            background: var(--bg-end);
            color: var(--text-primary);
        }

        .lang-selector .select-arrow {
            color: var(--text-muted);
            font-size: 12px;
            pointer-events: none;
            padding-right: 4px;
        }

        /* Transcription Area */
        .transcription-area {
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
        }

        .transcription-box {
            width: 100%;
            min-height: 220px;
            max-height: 400px;
            padding: 20px 22px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 18px;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.8;
            resize: none;
            outline: none;
            transition: all var(--transition);
            font-family: var(--font-family);
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .transcription-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .transcription-box::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .transcription-box:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .transcription-box::-webkit-scrollbar {
            width: 5px;
        }

        .transcription-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .transcription-box::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 20px;
        }

        /* Interim */
        .interim-container {
            margin-top: 6px;
            padding: 8px 18px;
            min-height: 32px;
            border-radius: 12px;
            background: rgba(90, 82, 217, 0.06);
            border: 1px dashed var(--accent-glow);
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .interim-container.hidden {
            display: none;
        }

        .interim-container .interim-label {
            font-weight: 500;
            color: var(--accent);
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .interim-container .interim-text {
            color: var(--accent);
            font-weight: 400;
            opacity: 0.9;
            word-break: break-word;
        }

        .interim-container .interim-cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--accent);
            animation: blink-cursor 0.9s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink-cursor {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* Buttons */
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
            margin-bottom: 6px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            text-decoration: none;
            white-space: nowrap;
            user-select: none;
            position: relative;
            min-height: 48px;
        }

        .btn i {
            font-size: 16px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0px);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 8px 28px var(--accent-glow);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
            box-shadow: 0 4px 16px rgba(229, 90, 106, 0.25);
        }

        .btn-danger:hover:not(:disabled) {
            background: #cc4a5a;
            border-color: #cc4a5a;
            box-shadow: 0 8px 28px rgba(229, 90, 106, 0.30);
        }

        .btn-success {
            background: var(--success);
            color: #0d0a1a;
            border-color: var(--success);
            box-shadow: 0 4px 16px rgba(59, 201, 110, 0.20);
        }

        .btn-success:hover:not(:disabled) {
            background: #2eb85e;
            border-color: #2eb85e;
        }

        .btn-ghost {
            background: transparent;
            border-color: transparent;
        }

        .btn-ghost:hover:not(:disabled) {
            background: var(--input-bg);
            border-color: var(--input-border);
        }

        .btn-record {
            padding: 10px 28px;
            font-size: 16px;
            min-height: 56px;
            min-width: 140px;
            border-radius: 50px;
            gap: 12px;
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 24px var(--accent-glow);
        }

        .btn-record i {
            font-size: 20px;
        }

        .btn-record:hover:not(:disabled) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 36px var(--accent-glow);
        }

        .btn-record.is-recording {
            background: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 4px 24px rgba(229, 90, 106, 0.30);
            animation: pulse-record 1.8s ease-in-out infinite;
        }

        .btn-record.is-recording:hover:not(:disabled) {
            background: #cc4a5a;
            border-color: #cc4a5a;
            box-shadow: 0 8px 36px rgba(229, 90, 106, 0.35);
        }

        @keyframes pulse-record {
            0%,
            100% {
                box-shadow: 0 4px 24px rgba(229, 90, 106, 0.30);
            }
            50% {
                box-shadow: 0 4px 48px rgba(229, 90, 106, 0.50), 0 0 0 8px rgba(229, 90, 106, 0.08);
            }
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        /* Compatibility Banner */
        .compat-banner {
            margin-top: 18px;
            padding: 12px 18px;
            border-radius: 14px;
            background: rgba(234, 179, 8, 0.10);
            border: 1px solid rgba(234, 179, 8, 0.20);
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
            transition: all var(--transition);
        }

        .compat-banner i {
            color: var(--warning);
            font-size: 18px;
            flex-shrink: 0;
        }

        .compat-banner.hidden {
            display: none;
        }

        .compat-banner.error {
            background: rgba(229, 90, 106, 0.10);
            border-color: rgba(229, 90, 106, 0.20);
        }

        .compat-banner.error i {
            color: var(--danger);
        }

        .compat-banner.success {
            background: rgba(59, 201, 110, 0.08);
            border-color: rgba(59, 201, 110, 0.15);
        }

        .compat-banner.success i {
            color: var(--success);
        }

        /* Keyboard hint inside app */
        .keyboard-hint {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--input-bg);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid var(--input-border);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .keyboard-hint kbd {
            background: rgba(26, 22, 51, 0.06);
            padding: 1px 8px;
            border-radius: 4px;
            font-family: var(--font-family);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ============================================================
                   Responsive
                   ============================================================ */

        @media (max-width: 820px) {
            body {
                padding-top: 68px;
            }
            .new-nav {
                padding: 10px 18px;
                height: 60px;
            }
            .logo {
                font-size: 26px;
            }
            .app-container {
                padding: 20px 20px 18px;
            }
            .brand-text h1 {
                font-size: 19px;
            }
            .status-bar {
                gap: 10px 18px;
                padding: 10px 14px;
            }
            .status-item {
                font-size: 12px;
            }
            .status-stats {
                font-size: 12px;
            }
            .btn {
                font-size: 13px;
                padding: 8px 16px;
                min-height: 42px;
            }
            .btn-record {
                min-height: 48px;
                min-width: 120px;
                font-size: 14px;
                padding: 8px 22px;
            }
            .transcription-box {
                min-height: 160px;
                max-height: 300px;
                font-size: 15px;
                padding: 16px 18px;
            }
            .lang-selector {
                min-width: 140px;
                padding: 2px 6px 2px 14px;
            }
            .lang-selector select {
                font-size: 13px;
                padding: 6px 2px 6px 0;
            }
            .interim-container {
                font-size: 13px;
                padding: 6px 14px;
                min-height: 28px;
            }
            footer {
                padding: 14px 18px;
                min-height: 60px;
            }
            .design-footer {
                font-size: 13px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding-top: 60px;
                padding-bottom: 0;
            }
            .new-nav {
                padding: 8px 14px;
                height: 54px;
            }
            .logo {
                font-size: 22px;
            }
            .home-btn .lines span {
                width: 20px;
                height: 2.5px;
            }
            .home-btn .label {
                font-size: 9px;
            }
            .app-container {
                padding: 16px 14px 14px;
                border-radius: 20px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .brand {
                gap: 10px;
            }
            .brand-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
                border-radius: 12px;
            }
            .brand-text h1 {
                font-size: 17px;
            }
            .brand-text .subtitle {
                font-size: 11px;
            }

            .status-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 12px;
            }
            .status-item {
                font-size: 12px;
            }
            .status-divider {
                display: none;
            }
            .status-stats {
                margin-left: 0;
                justify-content: space-around;
                padding-top: 6px;
                border-top: 1px solid var(--input-border);
            }

            .controls-row {

<!-- ============================================================
JAVASCRIPT – Complete Application Logic
============================================================ -->
<script>
    (function() {
        'use strict';

        // ============================================================
        // DOM References
        // ============================================================
        const transcriptionBox = document.getElementById('transcriptionBox');
        const interimContainer = document.getElementById('interimContainer');
        const interimText = document.getElementById('interimText');
        const recordBtn = document.getElementById('recordBtn');
        const recordIcon = document.getElementById('recordIcon');
        const recordLabel = document.getElementById('recordLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const timerDisplay = document.getElementById('timerDisplay');
        const wordCountEl = document.getElementById('wordCount');
        const charCountEl = document.getElementById('charCount');
        const languageSelect = document.getElementById('languageSelect');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const compatBanner = document.getElementById('compatBanner');
        const compatMessage = document.getElementById('compatMessage');

        // ============================================================
        // State
        // ============================================================
        let isRecording = false;
        let isSupported = false;
        let recognition = null;
        let finalTranscript = '';
        let interimTranscript = '';
        let timerSeconds = 0;
        let timerInterval = null;
        let isRestarting = false;
        let isStarting = false;
        let lastAddedFinal = '';

        // ============================================================
        // Speech Recognition Setup
        // ============================================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            isSupported = true;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            recognition.lang = languageSelect.value;

            recognition.onstart = function() {
                isRecording = true;
                isStarting = false;
                lastAddedFinal = '';
                updateUIForRecording();
                setStatus('listening', 'Listening…');
                showCompatBanner('success', '🎤 Listening… Speak into your microphone.');
            };

            recognition.onresult = function(event) {
                let interim = '';
                let final = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    const transcript = result[0].transcript;

                    if (result.isFinal) {
                        const trimmed = transcript.trim();
                        if (trimmed && trimmed !== lastAddedFinal.trim()) {
                            final += transcript + ' ';
                            lastAddedFinal = trimmed;
                        }
                    } else {
                        interim += transcript;
                    }
                }

                if (final) {
                    finalTranscript += final;
                }
                interimTranscript = interim;

                updateTranscriptionDisplay();
                updateStats();
            };

            recognition.onerror = function(event) {
                console.warn('Speech recognition error:', event.error);

                switch (event.error) {
                    case 'not-allowed':
                    case 'permission-denied':
                        setStatus('error', 'Permission denied');
                        showCompatBanner('error', '❌ Microphone access was denied. Please allow microphone access and try again.');
                        stopRecording();
                        break;
                    case 'no-speech':
                        setStatus('idle', 'No speech detected');
                        showCompatBanner('error', '🔇 No speech detected. Please check your microphone and try again.');
                        break;
                    case 'audio-capture':
                        setStatus('error', 'No microphone');
                        showCompatBanner('error', '🎤 No microphone detected. Please connect a microphone and try again.');
                        stopRecording();
                        break;
                    case 'network':
                        setStatus('error', 'Network error');
                        showCompatBanner('error', '🌐 Network error occurred. Please check your connection.');
                        if (isRecording) attemptRestart();
                        break;
                    case 'aborted':
                        break;
                    default:
                        setStatus('error', 'Error: ' + event.error);
                        showCompatBanner('error', '⚠️ Recognition error: ' + event.error);
                        if (isRecording) attemptRestart();
                }
            };

            recognition.onend = function() {
                if (isRecording && !isRestarting && !isStarting) {
                    attemptRestart();
                } else if (!isRecording) {
                    updateUIForStopped();
                    setStatus('idle', 'Ready');
                    if (!interimTranscript && !finalTranscript) {
                        showCompatBanner('success', '✅ Ready. Click "Start Recording" to begin.');
                    } else {
                        showCompatBanner('success', '⏹️ Stopped. You can copy or download your text.');
                    }
                }
                isRestarting = false;
                isStarting = false;
            };

            recognition.onspeechstart = function() {
                setStatus('listening', 'Speaking…');
            };

            recognition.onspeechend = function() {
                setStatus('listening', 'Processing…');
            };

        } else {
            isSupported = false;
            showCompatBanner('error', '❌ Your browser does not support the Web Speech API. Please use Chrome, Edge, or Safari.');
            recordBtn.disabled = true;
            recordBtn.title = 'Speech recognition not supported in this browser.';
            statusText.textContent = 'Unsupported';
        }

        // ============================================================
        // Core Functions
        // ============================================================

        function startRecording() {
            if (!isSupported || !recognition) {
                showCompatBanner('error', '❌ Speech recognition is not supported in this browser.');
                return;
            }
            if (isRecording) return;
            if (isStarting) return;

            isStarting = true;
            interimTranscript = '';

            try {
                recognition.lang = languageSelect.value;
                recognition.start();
                updateUIForRecording();
                setStatus('listening', 'Listening…');
                showCompatBanner('success', '🎤 Listening… Speak into your microphone.');
                startTimer();
            } catch (e) {
                console.error('Error starting recognition:', e);
                isRecording = false;
                isStarting = false;
                updateUIForStopped();
                setStatus('error', 'Failed to start');
                showCompatBanner('error', '⚠️ Could not start recognition. Please try again.');
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            isStarting = false;
            try {
                recognition.stop();
            } catch (e) { /* ignore */ }
            stopTimer();
            updateUIForStopped();

            if (interimTranscript) {
                const trimmed = interimTranscript.trim();
                if (trimmed && trimmed !== lastAddedFinal.trim()) {
                    finalTranscript += interimTranscript + ' ';
                    lastAddedFinal = trimmed;
                }
                interimTranscript = '';
                updateTranscriptionDisplay();
                updateStats();
            }
            setStatus('idle', 'Ready');
            showCompatBanner('success', '⏹️ Stopped. You can copy or download your text.');
        }

        function attemptRestart() {
            if (isRestarting || isStarting) return;
            isRestarting = true;
            try {
                if (recognition) recognition.stop();
            } catch (e) { /* ignore */ }

            setTimeout(() => {
                if (isRecording) {
                    try {
                        isStarting = true;
                        recognition.lang = languageSelect.value;
                        recognition.start();
                        isRestarting = false;
                        showCompatBanner('success', '🔄 Reconnected. Listening…');
                    } catch (e) {
                        isRestarting = false;
                        isStarting = false;
                        isRecording = false;
                        updateUIForStopped();
                        setStatus('error', 'Reconnect failed');
                        showCompatBanner('error', '⚠️ Failed to reconnect. Please click "Start Recording" again.');
                    }
                } else {
                    isRestarting = false;
                }
            }, 400);
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // ============================================================
        // UI Update Functions
        // ============================================================

        function updateUIForRecording() {
            recordBtn.classList.add('is-recording');
            recordIcon.className = 'fas fa-stop';
            recordLabel.textContent = 'Stop';
            recordBtn.setAttribute('aria-label', 'Stop recording');
            transcriptionBox.focus();
        }

        function updateUIForStopped() {
            recordBtn.classList.remove('is-recording');
            recordIcon.className = 'fas fa-microphone';
            recordLabel.textContent = 'Start Recording';
            recordBtn.setAttribute('aria-label', 'Start recording');
        }

        function setStatus(state, text) {
            statusDot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }

        function updateTranscriptionDisplay() {
            transcriptionBox.value = finalTranscript;

            if (interimTranscript && interimTranscript.trim()) {
                interimContainer.classList.remove('hidden');
                interimText.textContent = interimTranscript;
            } else {
                interimContainer.classList.add('hidden');
                interimText.textContent = '';
            }

            transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
        }

        function updateStats() {
            const text = finalTranscript + interimTranscript;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.replace(/\s/g, '').length;
            wordCountEl.textContent = words;
            charCountEl.textContent = chars;
        }

        function showCompatBanner(type, message) {
            compatBanner.className = 'compat-banner ' + type;
            compatMessage.textContent = message;
            compatBanner.classList.remove('hidden');
        }

        function hideCompatBanner() {
            compatBanner.classList.add('hidden');
        }

        // ============================================================
        // Timer
        // ============================================================

        function startTimer() {
            timerSeconds = 0;
            timerDisplay.textContent = '00:00';
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds++;
                const mins = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                const secs = String(timerSeconds % 60).padStart(2, '0');
                timerDisplay.textContent = mins + ':' + secs;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            timerDisplay.textContent = '00:00';
        }

        // ============================================================
        // Copy, Clear, Download
        // ============================================================

        function copyText() {
            const text = finalTranscript + interimTranscript;
            if (!text.trim()) {
                showCompatBanner('error', '📋 Nothing to copy — transcription is empty.');
                return;
            }
            const plainText = text.trim();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(plainText)
                    .then(() => {
                        showCompatBanner('success', '📋 Copied to clipboard!');
                        setTimeout(hideCompatBanner, 2500);
                    })
                    .catch(() => fallbackCopy(plainText));
            } else {
                fallbackCopy(plainText);
            }
        }

        function fallbackCopy(text) {
            const temp = document.createElement('textarea');
            temp.value = text;
            temp.style.position = 'fixed';
            temp.style.opacity = '0';
            temp.style.pointerEvents = 'none';
            document.body.appendChild(temp);
            temp.select();
            try {
                document.execCommand('copy');
                showCompatBanner('success', '📋 Copied to clipboard!');
                setTimeout(hideCompatBanner, 2500);
            } catch (e) {
                showCompatBanner('error', '⚠️ Could not copy. Please select and copy manually.');
            }
            document.body.removeChild(temp);
        }

        function clearText() {
            if (!finalTranscript && !interimTranscript) {
                showCompatBanner('error', '🗑️ Nothing to clear.');
                return;
            }
            if (isRecording) stopRecording();
            finalTranscript = '';
            interimTranscript = '';
            lastAddedFinal = '';
            updateTranscriptionDisplay();
            updateStats();
            resetTimer();
            setStatus('idle', 'Ready');
            showCompatBanner('success', '🗑️ Transcription cleared.');
            setTimeout(hideCompatBanner, 2000);
        }

        function downloadText() {
            const text = finalTranscript + interimTranscript;
            if (!text.trim()) {
                showCompatBanner('error', '📥 Nothing to download — transcription is empty.');
                return;
            }
            const plainText = text.trim();
            const blob = new Blob([plainText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:-]/g, '');
            a.download = 'transcript-' + timestamp + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showCompatBanner('success', '📥 Downloaded successfully!');
            setTimeout(hideCompatBanner, 2500);
        }

        // ============================================================
        // Navbar Home Button
        // ============================================================

        document.getElementById('homeBtn').addEventListener('click', function() {
            window.location.href = 'https://www.protoolss.online';
        });

        // ============================================================
        // Reset function (double-click footer to reset)
        // ============================================================

        function resetApp() {
            if (isRecording) stopRecording();
            finalTranscript = '';
            interimTranscript = '';
            lastAddedFinal = '';
            updateTranscriptionDisplay();
            updateStats();
            resetTimer();
            setStatus('idle', 'Ready');
            hideCompatBanner();
            languageSelect.value = 'en-US';
            if (recognition) recognition.lang = 'en-US';
            showCompatBanner('success', '🔄 App reset. Ready to go.');
            setTimeout(hideCompatBanner, 2500);
        }

        document.querySelector('.design-footer')?.addEventListener('dblclick', function(e) {
            if (e.target.tagName !== 'A') {
                resetApp();
                showCompatBanner('success', '🔄 Reset via footer double-click.');
                setTimeout(hideCompatBanner, 2000);
            }
        });

        // ============================================================
        // Event Listeners
        // ============================================================

        recordBtn.addEventListener('click', toggleRecording);

        languageSelect.addEventListener('change', function() {
            if (recognition) recognition.lang = this.value;
            if (isRecording) {
                stopRecording();
                setTimeout(() => startRecording(), 500);
            }
        });

        copyBtn.addEventListener('click', copyText);
        clearBtn.addEventListener('click', clearText);
        downloadBtn.addEventListener('click', downloadText);
        document.addEventListener('keydown', function(e) {
            if (e.altKey && (e.key === 's' || e.key === 'S')) {
                e.preventDefault();
                if (!recordBtn.disabled) toggleRecording();
                return;
            }
            if (e.altKey && (e.key === 'c' || e.key === 'C')) {
                e.preventDefault();
                copyText();
                return;
            }
            if (e.altKey && (e.key === 'x' || e.key === 'X')) {
                e.preventDefault();
                clearText();
                return;
            }
            if (e.altKey && (e.key === 'd' || e.key === 'D')) {
                e.preventDefault();
                downloadText();
                return;
            }
            if (e.key === 'Escape' && isRecording) {
                e.preventDefault();
                stopRecording();
                return;
            }
        });

        // ============================================================
        // Init
        // ============================================================

        if (isSupported) {
            showCompatBanner('success', '✅ Ready. Click "Start Recording" and speak.');
            setTimeout(hideCompatBanner, 3000);
            setStatus('idle', 'Ready');
            recordBtn.disabled = false;
        } else {
            recordBtn.disabled = true;
            setStatus('error', 'Unsupported');
        }

        updateStats();

        if (isSupported && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    stream.getTracks().forEach(t => t.stop());
                    if (!isRecording) setStatus('idle', 'Ready');
                })
                .catch(function(err) {
                    console.warn('Microphone check:', err);
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        showCompatBanner('error', '🔇 Microphone access blocked. Please allow microphone access in your browser settings.');
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        showCompatBanner('error', '🎤 No microphone found. Please connect a microphone.');
                    } else {
                        showCompatBanner('error', '⚠️ Microphone error: ' + err.message);
                    }
                });
        }

        console.log('🎤 Speech to Text initialized.');
        console.log('📋 Supported:', isSupported);
        if (isSupported) console.log('🌐 Default language:', recognition ? recognition.lang : 'en-US');

    })();
</script>

</body>
</html>
